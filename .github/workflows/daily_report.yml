name: Daily Market & Watchlist Report

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间 17:45 运行 (UTC 09:45)
    - cron: '45 9 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare matplotlib numpy requests

      - name: Generate Macro 4D Report
        run: python daily_cloud_update.py
        env:
          MX_APIKEY: ${{ secrets.MX_APIKEY }}

      - name: Generate Pro 3.0 Individual Stock Report
        continue-on-error: true
        run: |
          mkdir -p stock_charts_pro_v3
          if [ -f generate_individual_stock_pro_v3.py ]; then
            python generate_individual_stock_pro_v3.py
            cp watchlist_pro_v3.html watchlist.html
          else
            echo "generate_individual_stock_pro_v3.py not found, skipping..."
          fi

      - name: Commit and Push Changes
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@market.com"
          git add index.html watchlist.html pe_pb_2013_2026.csv *.png stock_charts_pro_v3/*.png charts/*.png || true
          git commit -m "Auto Update: Market & Individual Stock Pro 3.0 [$(date)]" || exit 0
          git push origin main
