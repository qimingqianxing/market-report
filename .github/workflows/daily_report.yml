name: Daily Market & Watchlist Report

on:
  push:
    branches:
      - main
  schedule:
    # 每天北京时间 17:45 运行 (UTC 09:45)
    - cron: '45 9 * * *'
  workflow_dispatch: # 支持手动触发

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas akshare matplotlib numpy requests

      - name: Generate Macro 4D Report
        run: python daily_cloud_update.py
        env:
          CHOICE_TOKEN: ${{ secrets.CHOICE_TOKEN }}

      - name: Generate Pro 3.0 Individual Stock Report
        continue-on-error: true
        run: |
          mkdir -p stock_charts_pro_v3
          # python generate_individual_stock_pro_v3.py || echo "Warning: Individual stock script not found, skipping..."
          # cp watchlist_pro_v3.html watchlist.html || echo "Warning: watchlist_pro_v3.html not found"

      - name: Commit and Push Changes
        run: |
          git config --global user.name "MarketBot"
          git config --global user.email "bot@market.com"
          git add index.html watchlist.html stock_charts_pro_v3/*.png charts/*.png
          git commit -m "Auto Update: Market & Individual Stock Pro 3.0 [$(date)]" || exit 0
          git push
